<svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="800" height="620" fill="#0a0e1a"/>
  <rect x="16" y="16" width="768" height="588" rx="14" fill="#111729" stroke="#232a3d" stroke-width="1"/>

  <text x="44" y="56" fill="#e6e8ef" font-size="18" font-weight="600">+ Create Agent Key</text>

  <text x="44" y="90" fill="#8b93a7" font-size="12">Key name</text>
  <rect x="44" y="100" width="712" height="38" rx="6" fill="#0d1220" stroke="#2a3247" stroke-width="1"/>
  <text x="56" y="124" fill="#5b6478" font-size="13" font-style="italic">e.g. claude-dev, cursor-team</text>

  <text x="44" y="164" fill="#8b93a7" font-size="12">Tools to grant access</text>

  <!-- Six option rows -->
  <g id="rows">
    <!-- row template values: y offset, title, subtitle -->
  </g>

  <!-- Row 1 -->
  <rect x="44" y="176" width="712" height="52" rx="6" fill="#0d1220" stroke="#232a3d" stroke-width="1"/>
  <rect x="60" y="196" width="14" height="14" rx="3" fill="none" stroke="#5b6478" stroke-width="1.5"/>
  <text x="86" y="198" fill="#e6e8ef" font-size="13" font-weight="600">Crypto Posture</text>
  <text x="86" y="216" fill="#7a8296" font-size="11">Summary of vulnerable findings across all repos</text>

  <!-- Row 2 -->
  <rect x="44" y="236" width="712" height="52" rx="6" fill="#0d1220" stroke="#232a3d" stroke-width="1"/>
  <rect x="60" y="256" width="14" height="14" rx="3" fill="none" stroke="#5b6478" stroke-width="1.5"/>
  <text x="86" y="258" fill="#e6e8ef" font-size="13" font-weight="600">Recommendations</text>
  <text x="86" y="276" fill="#7a8296" font-size="11">Per-algorithm PQC migration guidance</text>

  <!-- Row 3 -->
  <rect x="44" y="296" width="712" height="52" rx="6" fill="#0d1220" stroke="#232a3d" stroke-width="1"/>
  <rect x="60" y="316" width="14" height="14" rx="3" fill="none" stroke="#5b6478" stroke-width="1.5"/>
  <text x="86" y="318" fill="#e6e8ef" font-size="13" font-weight="600">Keypair Lifecycle</text>
  <text x="86" y="336" fill="#7a8296" font-size="11">Keypair rollout stage and endpoint map</text>

  <!-- Row 4 -->
  <rect x="44" y="356" width="712" height="52" rx="6" fill="#0d1220" stroke="#232a3d" stroke-width="1"/>
  <rect x="60" y="376" width="14" height="14" rx="3" fill="none" stroke="#5b6478" stroke-width="1.5"/>
  <text x="86" y="378" fill="#e6e8ef" font-size="13" font-weight="600">Blast Radius</text>
  <text x="86" y="396" fill="#7a8296" font-size="11">Repos and files affected by a given algorithm</text>

  <!-- Row 5 -->
  <rect x="44" y="416" width="712" height="52" rx="6" fill="#0d1220" stroke="#232a3d" stroke-width="1"/>
  <rect x="60" y="436" width="14" height="14" rx="3" fill="none" stroke="#5b6478" stroke-width="1.5"/>
  <text x="86" y="438" fill="#e6e8ef" font-size="13" font-weight="600">Edge Coverage</text>
  <text x="86" y="456" fill="#7a8296" font-size="11">TLS/mTLS endpoint inventory</text>

  <!-- Row 6 -->
  <rect x="44" y="476" width="712" height="52" rx="6" fill="#0d1220" stroke="#232a3d" stroke-width="1"/>
  <rect x="60" y="496" width="14" height="14" rx="3" fill="none" stroke="#5b6478" stroke-width="1.5"/>
  <text x="86" y="498" fill="#e6e8ef" font-size="13" font-weight="600">Migrate Repository (write)</text>
  <text x="86" y="516" fill="#7a8296" font-size="11">Start a PQC migration and open a draft PR (mutation)</text>

  <!-- Create Key button -->
  <rect x="44" y="548" width="130" height="40" rx="7" fill="#2d3a5c" stroke="#4a5a8a" stroke-width="1"/>
  <text x="70" y="573" fill="#c9d1ea" font-size="14" font-weight="600">+ Create Key</text>

  <text x="600" y="608" fill="#4a5268" font-size="10" font-style="italic">Illustrative layout — not a live screenshot</text>
</svg>
